<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMS | Baliuag University</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="logo-placeholder">
                <img src="../51a6e86a-8647-41a8-a63f-439f5c142b8d.jpg" alt="MMS Logo" class="login-logo" onerror="this.src='https://via.placeholder.com/150?text=MMS+Logo'">
            </div>
            <h2>Welcome Back</h2>
            <p>Sign in to the Maintenance & Monitoring System</p>
            
            <form action="dashboard.html" method="GET">
                <div class="input-group">
                    <label for="email">University Email</label>
                    <input type="email" id="email" name="email" placeholder="student@baliuagu.edu.ph" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary">Log In</button>
            </form>
            <div class="login-footer">
                <a href="#">Forgot Password?</a> | <a href="#">Need Help?</a>
            </div>
        </div>
    </div>
</body>
</html>
