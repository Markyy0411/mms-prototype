<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMS | Baliuag University</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="logo-placeholder">
                <img src="logo.png" alt="MMS Logo" class="login-logo" onerror="this.src='https://via.placeholder.com/150?text=MMS+Logo'">
            </div>
            <h2>Welcome Back</h2>
            <p>Sign in to the Maintenance & Monitoring System</p>
            
            <form id="loginForm">
                <div class="input-group">
                    <label for="role">Login As</label>
                    <select id="role" name="role" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-family: 'Inter', sans-serif;">
                        <option value="requester">Requester (Student/Faculty)</option>
                        <option value="fms">Facility Management Staff (FMS)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="email">University Email</label>
                    <input type="email" id="email" name="email" placeholder="user@baliuagu.edu.ph" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary">Log In</button>
            </form>
            <div class="login-footer">
                <a href="#">Forgot Password?</a> | <a href="#">Need Help?</a>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
